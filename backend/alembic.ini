# Alembic Migration Environment — Async PostgreSQL + PostGIS
#
# Configuration notes:
#   - sqlalchemy.url is injected programmatically from Settings.SYNC_DATABASE_URL.
#     The value in this file is a placeholder; it is overridden by env.py.
#   - script_location points to the alembic/ directory relative to this ini file.
#   - file_template uses a timestamp prefix for migration files, making the
#     order unambiguous independent of the revision ID.
#
# Running migrations:
#   alembic upgrade head          # Apply all pending migrations
#   alembic downgrade -1          # Roll back the last migration
#   alembic revision --autogenerate -m "add sensors table"  # Generate a migration
#   alembic history               # List migration history
#   alembic current               # Show currently applied revision

[alembic]
script_location = alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
prepend_sys_path = .

# Placeholder — overridden in alembic/env.py via Settings.SYNC_DATABASE_URL
sqlalchemy.url = postgresql+psycopg2://vayu:vayu_password@localhost:5432/vayu_drishti

[post_write_hooks]
# Automatically format generated migration files with black
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
